# Qwen3 MoE family — class catalog (mixture-of-experts decoder-only LLMs).
#
# This catalog covers every Qwen3 MoE checkpoint
# (Qwen3-30B-A3B-* / Qwen3-235B-A22B-* / ...). Pick the specific
# model at the CLI. The dense variants (Qwen3-8B/14B/32B/...) use a
# different ForCausalLM class and live in qwen3.yaml.
#
# Like the dense Qwen3, the attention block has per-head QK
# normalization merged into a single ``qk_norm`` catalog entry. The
# MLP is replaced by ``Qwen3MoeSparseMoeBlock`` which aggregates the
# gate and expert routing into one kernel we measure as a unit.
# ``num_experts`` / ``top_k`` are read from the HF config at engine
# boot, not declared here.
#
# Canonical layer names mirror vLLM's attribute names (see
# ../vllm/vllm/model_executor/models/qwen3_moe.py).
#
# ``sequence:`` describes the ordered pipeline the simulator's
# trace_generator walks to emit one iteration. Names must appear in
# ``catalog`` below. TP ALLREDUCE (after ``o_proj`` / ``down_proj``)
# and EP ALLTOALL (around ``moe``) are attached by the simulator from
# cluster config and need not be listed here.


sequence:
  prologue:  [embedding]
  pre_attn:  [layernorm, qkv_proj, qk_norm, rotary_emb, attention]
  post_attn: [o_proj, layernorm]
  mlp_dense: []
  mlp_moe:   [moe]
  head:      [final_layernorm, lm_head, sampler]


catalog:
  dense:
    embedding:
      vllm: VocabParallelEmbedding
    layernorm:
      vllm: RMSNorm
      within: Qwen3MoeDecoderLayer
      tp_stable: true
    qkv_proj:
      vllm: QKVParallelLinear
    qk_norm:
      vllm: RMSNorm
      within: Qwen3MoeAttention
      tp_stable: true
    rotary_emb:
      vllm: RotaryEmbedding
    o_proj:
      vllm: RowParallelLinear
      within: Qwen3MoeAttention
    final_layernorm:
      vllm: RMSNorm
      within: Qwen3MoeForCausalLM
      tp_stable: true
  per_sequence:
    lm_head:
      vllm: LogitsProcessor
    sampler:
      vllm: Sampler
      tp_stable: true
  attention:
    attention:
      vllm: Attention
  moe:
    moe:
      vllm: Qwen3MoeSparseMoeBlock
